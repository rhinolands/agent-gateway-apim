<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" role="img" aria-label="Governed agent gateway on Azure APIM: an AI agent gets an app-only token from Microsoft Entra ID, calls APIM with a Bearer JWT; APIM runs a fail-closed policy gateway (validate-jwt, authorize Agent.Invoke, rate-limit, managed-identity egress, audit) then forwards to the MCP/A2A backend, with secrets from Key Vault and audit to Log Analytics.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5A5142" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A8362B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="470" fill="#F4EFE3"/>
  <text x="24" y="32" font-size="21" font-weight="700" fill="#1B1916">Governed Agent Gateway &#183; Azure APIM</text>
  <text x="24" y="52" font-size="13" fill="#6B6151">app-only authN &#8594; policy authZ &#8594; managed-identity egress &#8594; fail closed</text>

  <rect x="285" y="64" width="150" height="46" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="360" y="84" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1B1916">Microsoft Entra ID</text>
  <text x="360" y="100" text-anchor="middle" font-size="11" fill="#6B6151">issues scoped token</text>

  <rect x="256" y="130" width="208" height="232" rx="10" fill="#1B1916"/>
  <text x="360" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#F4EFE3">AZURE APIM</text>
  <text x="360" y="176" text-anchor="middle" font-size="11.5" fill="#C9BCA0">policy gateway &#183; single enforcement point</text>
  <line x1="278" y1="190" x2="442" y2="190" stroke="#4A443B" stroke-width="1"/>
  <text x="278" y="214" font-size="12.5" fill="#EDE6D8">&#8226; validate-jwt &#8212; signature + claims</text>
  <text x="278" y="237" font-size="12.5" fill="#EDE6D8">&#8226; authorize &#8212; Agent.Invoke role</text>
  <text x="278" y="260" font-size="12.5" fill="#EDE6D8">&#8226; rate-limit &#8212; per-agent quota</text>
  <text x="278" y="283" font-size="12.5" fill="#EDE6D8">&#8226; managed identity &#8212; backend cred</text>
  <text x="278" y="306" font-size="12.5" fill="#F2B2A8" font-weight="600">&#8226; fail closed &#8212; 401 / 403 on any deny</text>
  <text x="278" y="329" font-size="12.5" fill="#EDE6D8">&#8226; audit &#8212; allow + deny</text>

  <rect x="28" y="196" width="128" height="66" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="92" y="226" text-anchor="middle" font-size="15" font-weight="600" fill="#1B1916">AI Agent</text>
  <text x="92" y="244" text-anchor="middle" font-size="11.5" fill="#6B6151">app-only, scoped</text>

  <path d="M96,196 C70,150 170,104 283,92" fill="none" stroke="#A8362B" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowR)"/>
  <text x="38" y="150" font-size="11" font-weight="700" fill="#A8362B">1 &#183; app-only token</text>

  <path d="M360,110 L360,130" fill="none" stroke="#A8362B" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowR)"/>
  <text x="368" y="124" font-size="10.5" fill="#A8362B">JWKS validate</text>

  <line x1="156" y1="229" x2="254" y2="229" stroke="#5A5142" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="205" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#A8362B">2 &#183; Bearer JWT</text>

  <rect x="548" y="132" width="150" height="56" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="623" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#1B1916">MCP / A2A Backend</text>
  <text x="623" y="174" text-anchor="middle" font-size="11" fill="#6B6151">governed actions</text>
  <line x1="464" y1="170" x2="546" y2="162" stroke="#5A5142" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="506" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#A8362B">3 &#183; forward (MI)</text>

  <rect x="548" y="208" width="150" height="56" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="623" y="232" text-anchor="middle" font-size="14" font-weight="600" fill="#1B1916">Azure Key Vault</text>
  <text x="623" y="250" text-anchor="middle" font-size="11" fill="#6B6151">secrets via MI</text>
  <line x1="464" y1="236" x2="546" y2="236" stroke="#5A5142" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="506" y="228" text-anchor="middle" font-size="10.5" fill="#6B6151">secrets</text>

  <rect x="548" y="284" width="150" height="56" rx="8" fill="#E7DCC6" stroke="#D6C9AA"/>
  <text x="623" y="308" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1B1916">Log Analytics</text>
  <text x="623" y="326" text-anchor="middle" font-size="11" fill="#6B6151">+ App Insights</text>
  <line x1="464" y1="310" x2="546" y2="312" stroke="#5A5142" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="506" y="302" text-anchor="middle" font-size="10.5" fill="#6B6151">audit</text>

  <line x1="40" y1="392" x2="680" y2="392" stroke="#DDD2BC" stroke-width="1"/>
  <text x="360" y="414" text-anchor="middle" font-size="11.5" fill="#6B6151">Edge authN (JWT) &#183; least-privilege authZ &#183; secrets only in Key Vault &#183; managed-identity egress &#183; every decision audited</text>
  <text x="360" y="438" text-anchor="middle" font-size="12" font-weight="600" fill="#A8362B">Change an agent&#8217;s reach = a reviewed policy change, not a code edit.</text>
</svg>
